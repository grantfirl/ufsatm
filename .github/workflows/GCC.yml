# This is a CI workflow for the ufsatm project.
#
# This workflow builds and tests the ufsatm library using GCC, and it tests
# different CMake build options.
#
# Alex Richert, 6 Dec 2023

name: GCC
on:
  push:
    branches:
    - develop
  pull_request:
    branches:
    - develop
  workflow_dispatch:

jobs:
  build_spack:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        gcc_ver: ["12"]
        mpi: ["mpich", "openmpi"]

    steps:

    - name: checkout-ufsatm
      uses: actions/checkout@v4
      with:
        path: ${{ github.workspace }}/ufsatm
        submodules: recursive

    - name: install-deps
      run: |
        if [ ${{ matrix.mpi }} == mpich ]; then mpi_pkgs="mpich libmpich-dev"; fi
        if [ ${{ matrix.mpi }} == openmpi ]; then mpi_pkgs="openmpi-bin libopenmpi-dev"; fi
        sudo apt-get install cmake git-lfs libopenblas-serial-dev $mpi_pkgs

    - name: cache-spack
      id: cache-spack
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/spack-develop
        key: spack-${{ hashFiles('ufsatm/ci/spack.yaml') }}-gcc${{ matrix.gcc_ver }}-${{ matrix.mpi }}

    # Building dependencies takes 40+ min
    - name: spack-install
      if: steps.cache-spack.outputs.cache-hit != 'true'
      run: |
        wget --no-verbose https://github.com/spack/spack/archive/refs/heads/develop.zip
        unzip develop.zip -d ${GITHUB_WORKSPACE}/ &> unzip.out
        . ${GITHUB_WORKSPACE}/spack-develop/share/spack/setup-env.sh
        spack env create gcc${{ matrix.gcc_ver }} ${GITHUB_WORKSPACE}/ufsatm/ci/spack.yaml
        spack env activate gcc${{ matrix.gcc_ver }}
        spack compiler find
        spack config add "packages:c:require:['gcc@${{ matrix.gcc_ver }}']"
        spack config add "packages:cxx:require:['gcc@${{ matrix.gcc_ver }}']"
        spack config add "packages:fortran:require:['gcc@${{ matrix.gcc_ver }}']"
        ## Add externals, based on what we installed above with apt
        spack external find --not-buildable gmake cmake git git-lfs perl python ${{ matrix.mpi }}
        spack external find --not-buildable --path /usr/lib/x86_64-linux-gnu/openblas-serial/ openblas
        ##
        spack concretize |& tee ${SPACK_ENV}/log.concretize
        spack install -j2 --fail-fast
        echo "spackrc=$?" >> ${GITHUB_ENV}
        spack clean --all

  build_ufsatm:
    needs: build_spack
    runs-on: ubuntu-latest

    strategy:
      matrix:
        cmake_opts: ["-D32BIT=ON", "-D32BIT=OFF"]
        gcc_ver: ["12"]
        mpi: ["mpich", "openmpi"]

    steps:

    - name: install-deps
      run: |
        if [ ${{ matrix.mpi }} == mpich ]; then mpi_pkgs="mpich libmpich-dev"; fi
        if [ ${{ matrix.mpi }} == openmpi ]; then mpi_pkgs="openmpi-bin libopenmpi-dev"; fi
        sudo apt-get install cmake libopenblas-serial-dev $mpi_pkgs

    # Only do Doxygen and gcovr build for one job
    - name: decide-doc-gcovr-build
      run: |
        echo 'common_fortran_flags=-fno-lto -fno-strict-aliasing' | tee -a ${GITHUB_ENV}
        if [[ "${{ matrix.cmake_opts }}" == "-D32BIT=ON" && "${{ matrix.gcc_ver }}" == 12 && "${{ matrix.mpi }}" == mpich ]]; then
          echo 'devbuild=ON' | tee -a ${GITHUB_ENV}
          echo 'gcov_fortran_flags=-fprofile-abs-path -fprofile-arcs -ftest-coverage -O0' | tee -a ${GITHUB_ENV}
          echo 'docs_cmake=-DENABLE_FV3ATM_DOCS=ON' | tee -a ${GITHUB_ENV}
        else
          echo 'devbuild=OFF' | tee -a ${GITHUB_ENV}
          echo 'gcov_fortran_flags=' | tee -a ${GITHUB_ENV}
        fi

    - name: install-utilities
      run: |
        python3 -m pip install gcovr
        if [[ "${{ env.devbuild }}" == "ON" ]]; then sudo apt-get install doxygen graphviz; fi

    - name: checkout-ufsatm
      uses: actions/checkout@v4
      with:
        path: ${{ github.workspace }}/ufsatm
        submodules: recursive

    - name: cache-spack
      id: cache-spack
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/spack-develop
        key: spack-${{ hashFiles('ufsatm/ci/spack.yaml') }}-gcc${{ matrix.gcc_ver }}-${{ matrix.mpi }}

    - name: build-ufsatm
      run: |
        . ${GITHUB_WORKSPACE}/spack-develop/share/spack/setup-env.sh
        spack env activate gcc${{ matrix.gcc_ver }}
        spack load $(spack find --format "{name}")
        cd ${GITHUB_WORKSPACE}/ufsatm
        mkdir ${GITHUB_WORKSPACE}/build
        cd ${GITHUB_WORKSPACE}/build
        export CC=mpicc ; export OMPI_CC=gcc-${{ matrix.gcc_ver }} ; export MPICH_CC=gcc-${{ matrix.gcc_ver }}
        export CXX=mpicxx ; export OMPI_CXX=g++-${{ matrix.gcc_ver }} ; export MPICH_CXX=g++-${{ matrix.gcc_ver }}
        export FC=mpif90 ; export OMPI_FC=gfortran-${{ matrix.gcc_ver }} ; export MPICH_FC=gfortran-${{ matrix.gcc_ver }}
        cmake ${GITHUB_WORKSPACE}/ufsatm -DBUILD_UFSATM_TESTING=ON -DFV3=ON ${{ matrix.cmake_opts }} "-DCMAKE_Fortran_FLAGS=${{ env.common_fortran_flags }} ${{ env.gcov_fortran_flags }}" -DCMAKE_EXE_LINKER_FLAGS=-fno-lto ${{ env.docs_cmake }}
        make -j2

    - name: run-tests
      run: |
        cd $GITHUB_WORKSPACE/build
        ctest -j2 --output-on-failure --rerun-failed

    - name: get-test-coverage
      if: ${{ env.devbuild == 'ON' }}
      run: |
        cd $GITHUB_WORKSPACE/build
        gcovr -r .. -v --html-details --gcov-executable gcov-12 --exclude $GITHUB_WORKSPACE/ufsatm/tests --exclude $GITHUB_WORKSPACE/ufsatm/stochastic_physics --exclude $GITHUB_WORKSPACE/ufsatm/build/ccpp --exclude $GITHUB_WORKSPACE/ufsatm/ccpp/physics --exclude $GITHUB_WORKSPACE/ufsatm/ccpp/framework --exclude $GITHUB_WORKSPACE/ufsatm/atmos_cubed_sphere  --exclude CMakeFiles --print-summary -o test-coverage.html

    - name: upload-test-coverage
      uses: actions/upload-artifact@v4
      if: ${{ env.devbuild == 'ON' }}
      with:
        name: test-coverage-ufsatm-${{ github.sha }}
        path: |
              ${{ github.workspace }}/build/*.html
              ${{ github.workspace }}/build/*.css

    - name: build-docs
      if: ${{ env.devbuild == 'ON' }}
      run: |
        cd $GITHUB_WORKSPACE/build
        make doxygen_doc

    - name: upload-docs
      uses: actions/upload-artifact@v4
      if: ${{ env.devbuild == 'ON' }}
      with:
        name: docs-ufsatm
        path: |
          build/docs/html

    - name: debug-artifacts
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: ccpp_prebuild_logs-gcc${{ matrix.gcc_ver }}-${{ matrix.mpi }}-${{ matrix.cmake_opts }}
        path: ${{ github.workspace }}/build/ccpp/ccpp_prebuild.*
